<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>🏆 BetZone</h1>
      <p>Plataforma de apuestas y chat profesional</p>
    </div>

    @if (error) {
      <div class="alert alert-error">{{ error }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input id="email" type="email" class="form-input" [(ngModel)]="email" name="email" required placeholder="nombre@ejemplo.com" />
      </div>

      <div class="form-group">
        <div class="label-row">
          <label for="password">Contraseña</label>
          <a routerLink="/forgot-password" class="forgot-link">¿La olvidaste?</a>
        </div>
        <input id="password" type="password" class="form-input" [(ngModel)]="password" name="password" required placeholder="••••••••" />
      </div>

      <button type="submit" class="btn btn-primary submit-btn" [disabled]="loading">
        {{ loading ? 'Ingresando...' : 'Ingresar al Portal' }}
      </button>
    </form>

    <p class="auth-footer">
      ¿Aún no tienes cuenta?
      <a routerLink="/register">Regístrate aquí</a>
    </p>
  </div>
</div>
