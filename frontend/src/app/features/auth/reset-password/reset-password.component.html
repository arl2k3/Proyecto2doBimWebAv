<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>🔐 Nueva Contraseña</h1>
      <p>Establece tu nueva contraseña de acceso</p>
    </div>

    @if (message) {
      <div class="alert" [class.alert-error]="isError" [class.alert-success]="!isError">{{ message }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="password">Nueva Contraseña</label>
        <input id="password" type="password" class="form-input" [(ngModel)]="password" name="password" required placeholder="••••••••" />
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirmar Contraseña</label>
        <input id="confirmPassword" type="password" class="form-input" [(ngModel)]="confirmPassword" name="confirmPassword" required placeholder="••••••••" />
      </div>

      <button type="submit" class="btn btn-primary submit-btn" [disabled]="loading">
        {{ loading ? 'Guardando...' : 'Restablecer Contraseña' }}
      </button>
    </form>

    <p class="auth-footer">
      <a routerLink="/login">← Volver al login</a>
    </p>
  </div>
</div>
