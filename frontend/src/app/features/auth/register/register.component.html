<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>🏆 BetZone</h1>
      <p>Crea tu cuenta y comienza a apostar</p>
    </div>

    @if (message) {
      <div class="alert" [class.alert-error]="isError" [class.alert-success]="!isError">{{ message }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="username">Nombre de Usuario</label>
        <input id="username" type="text" class="form-input" [(ngModel)]="username" name="username" required placeholder="tu_usuario" />
      </div>

      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input id="email" type="email" class="form-input" [(ngModel)]="email" name="email" required placeholder="nombre@ejemplo.com" />
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" class="form-input" [(ngModel)]="password" name="password" required placeholder="••••••••" />
      </div>

      <button type="submit" class="btn btn-primary submit-btn" [disabled]="loading">
        {{ loading ? 'Registrando...' : 'Crear Cuenta' }}
      </button>
    </form>

    <p class="auth-footer">
      ¿Ya tienes cuenta?
      <a routerLink="/login">Inicia sesión</a>
    </p>
  </div>
</div>
