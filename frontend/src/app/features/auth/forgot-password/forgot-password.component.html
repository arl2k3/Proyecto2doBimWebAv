<div class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1>🔑 Recuperar Contraseña</h1>
      <p>Ingresa tu correo y te enviaremos un enlace de restablecimiento</p>
    </div>

    @if (message) {
      <div class="alert" [class.alert-error]="isError" [class.alert-success]="!isError">{{ message }}</div>
    }

    <form (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Correo Electrónico</label>
        <input id="email" type="email" class="form-input" [(ngModel)]="email" name="email" required placeholder="nombre@ejemplo.com" />
      </div>

      <button type="submit" class="btn btn-primary submit-btn" [disabled]="loading">
        {{ loading ? 'Enviando...' : 'Enviar Enlace' }}
      </button>
    </form>

    <p class="auth-footer">
      <a routerLink="/login">← Volver al login</a>
    </p>
  </div>
</div>
