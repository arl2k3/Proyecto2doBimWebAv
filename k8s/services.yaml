# TODO: replace image registry with ghcr.io/<owner>/betzone-* after CI/CD push
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: betzone
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/OWNER/betzone-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: betzone-config
            - secretRef:
                name: betzone-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: betzone
spec:
  selector:
    app: auth-service
  ports:
    - port: 3001
      targetPort: 3001
---
