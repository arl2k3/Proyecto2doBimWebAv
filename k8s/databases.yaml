apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: betzone
data:
  init-extensions.sql: |
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";
    CREATE EXTENSION IF NOT EXISTS "pgcrypto";
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: auth-db
  namespace: betzone
spec:
  serviceName: auth-db
  replicas: 1
  selector:
    matchLabels:
      app: auth-db
  template:
    metadata:
      labels:
        app: auth-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: betzone-secrets
                  key: AUTH_DB_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: betzone-secrets
                  key: AUTH_DB_PASS
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: betzone-config
                  key: AUTH_DB_NAME
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "betzone", "-d", "auth_db"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: init
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-db
  namespace: betzone
spec:
  clusterIP: None
  selector:
    app: auth-db
  ports:
    - port: 5432
      targetPort: 5432
---
